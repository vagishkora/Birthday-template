<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Adventures</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cursor.css">
    <link rel="stylesheet" href="avatars.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #020617;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding-top: 60px;
        }

        h1 {
            text-align: center;
            font-weight: 600;
            margin-bottom: 30px;
            background: linear-gradient(to right, #f472b6, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Progress Bar */
        .progress-wrap {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            height: 10px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #ec4899, #8b5cf6);
            width: 0%;
            transition: width 0.5s ease;
        }

        .stats {
            text-align: right;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: -35px;
            margin-bottom: 40px;
        }

        /* List */
        .bucket-list {
            list-style: none;
            padding: 0;
        }

        .bucket-item {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 15px;
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.2s, background 0.2s;
            cursor: pointer;
        }

        .bucket-item:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.08);
        }

        .bucket-item.completed {
            opacity: 0.6;
        }

        .bucket-item.completed span {
            text-decoration: line-through;
            color: #9ca3af;
        }

        /* Checkbox */
        .custom-check {
            width: 24px;
            height: 24px;
            border: 2px solid #ec4899;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .bucket-item.completed .custom-check {
            background: #ec4899;
        }

        .custom-check i {
            display: none;
            font-size: 0.8rem;
        }

        .bucket-item.completed .custom-check i {
            display: block;
        }

        /* Add New */
        .add-box {
            display: flex;
            gap: 10px;
            margin-top: 40px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-family: inherit;
        }

        button {
            padding: 12px 20px;
            background: #ec4899;
            border: none;
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .delete-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            color: #ef4444;
            /* Red */
            background: rgba(239, 68, 68, 0.1);
        }

        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="heartbeat-bg"></div>
    <a href="home.html" class="home-btn"><i class="fas fa-home"></i></a>

    <div class="container">
        <h1>Our Bucket List 🌍</h1>

        <div class="progress-wrap">
            <div class="progress-fill" id="progress-bar"></div>
        </div>
        <div class="stats" id="stats">0% Completed</div>

        <ul class="bucket-list" id="list">
            <!-- Items injected by JS -->
        </ul>

        <div class="add-box">
            <input type="text" id="new-item" placeholder="Add a new dream...">
            <button onclick="addItem()">Add</button>
        </div>
    </div>

    <script>
        // Init Data
        const defaultItems = [
            { text: "Watch Northern Lights 🌌", done: false },
            { text: "Skydiving Together 🪂", done: false },
            { text: "Road Trip to Ladakh 🏍️", done: false },
            { text: "Build a Pillow Fort 🏰", done: true }, // Cute completed one
            { text: "Adopt a Puppy 🐶", done: false }
        ];

        let items = JSON.parse(localStorage.getItem('bucketList')) || defaultItems;

        const listEl = document.getElementById('list');
        const progressEl = document.getElementById('progress-bar');
        const statsEl = document.getElementById('stats');
        const inputEl = document.getElementById('new-item');

        function render() {
            listEl.innerHTML = '';
            let completed = 0;

            items.forEach((item, index) => {
                if (item.done) completed++;

                const li = document.createElement('li');
                li.className = `bucket-item ${item.done ? 'completed' : ''}`;
                li.onclick = () => toggleItem(index);

                li.innerHTML = `
                    <div style="display:flex; align-items:center; gap:15px; flex:1;" onclick="toggleItem(${index})">
                        <div class="custom-check">
                            <i class="fas fa-check"></i>
                        </div>
                        <span style="flex:1;">${item.text}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteItem(event, ${index})">
                        <i class="fas fa-trash"></i>
                    </button>
                `;
                listEl.appendChild(li);
            });

            // Update Stats
            const percent = items.length > 0 ? Math.round((completed / items.length) * 100) : 0;
            progressEl.style.width = percent + '%';
            statsEl.innerText = `${percent}% Completed`;

            // Save
            localStorage.setItem('bucketList', JSON.stringify(items));
        }

        function toggleItem(index) {
            items[index].done = !items[index].done;
            render();
        }

        function addItem() {
            const text = inputEl.value.trim();
            if (text) {
                items.push({ text: text, done: false });
                inputEl.value = '';
                render();
            }
        }

        function deleteItem(event, index) {
            event.stopPropagation(); // Prevent toggling
            if (confirm('Remove this dream?')) {
                items.splice(index, 1);
                render();
            }
        }

        // Render on load
        render();
    </script>
    <script src="cursor.js"></script>
    <script src="avatars.js"></script>

</body>

</html>
