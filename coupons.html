<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Vouchers</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&family=Courier+Prime:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cursor.css">
    <link rel="stylesheet" href="avatars.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #020617;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-title {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            margin-top: 60px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #FFD700, #FDB931, #FFD700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            text-shadow: 0 0 20px rgba(253, 185, 49, 0.3);
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 50px;
            font-size: 1.1rem;
        }

        .coupon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            max-width: 1100px;
            width: 90%;
            padding-bottom: 50px;
            perspective: 1000px;
            /* Essential for 3D effect */
        }

        /* 3D CARD WRAPPER */
        .coupon-wrapper {
            background-color: transparent;
            height: 180px;
            perspective: 1000px;
            cursor: pointer;
        }

        .coupon-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .coupon-wrapper:hover .coupon-inner {
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.2);
            transform: translateY(-5px);
            /* Gentle lift on hover */
        }

        .coupon-wrapper.flipped .coupon-inner {
            transform: rotateY(180deg);
        }

        /* FRONT & BACK GENERIC */
        .coupon-front,
        .coupon-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #d4af37;
            background: linear-gradient(135deg, #fffbf0, #fff);
        }

        /* FRONT STYLING */
        .coupon-front {
            display: flex;
            color: #333;
        }

        .stub {
            width: 70px;
            background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 2px dashed rgba(0, 0, 0, 0.3);
        }

        .stub span {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
            font-family: 'Cinzel', serif;
            font-weight: 700;
            color: #5c4013;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        .content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .content i {
            font-size: 2rem;
            color: #d4af37;
            margin-bottom: 10px;
        }

        .content h3 {
            margin: 0;
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: #2c1a06;
        }

        .content p {
            margin: 5px 0 0;
            font-size: 0.8rem;
            color: #666;
            font-style: italic;
        }

        /* BACK STYLING (The Wonka Side) */
        .coupon-back {
            background: linear-gradient(135deg, #fdfbf7, #fff0f5);
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #333;
            border: 2px solid #d4af37;
        }

        .serial-number {
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            color: #5c4013;
            letter-spacing: 1px;
            font-size: 1.1rem;
            margin-bottom: 5px;
            border-bottom: 1px solid #d4af37;
            padding-bottom: 5px;
        }

        .terms {
            font-size: 0.7rem;
            color: #888;
            margin-top: 10px;
            font-style: italic;
            max-width: 90%;
            line-height: 1.4;
        }

        /* REDEEMED STAMP (Now on Back) */
        .stamp {
            margin-top: 10px;
            border: 4px solid #d00;
            color: #d00;
            font-family: 'Courier Prime', monospace;
            font-weight: 900;
            font-size: 1.5rem;
            padding: 5px 15px;
            text-transform: uppercase;
            border-radius: 8px;
            transform: rotate(-10deg);
            opacity: 0.8;
            background: rgba(255, 255, 255, 0.5);
            mix-blend-mode: multiply;
        }

        /* Nav Buttons */
        .home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.5);
            transition: color 0.3s;
            z-index: 100;
        }

        .home-btn:hover {
            color: #FFD700;
        }

        /* RESET BUTTON */
        .reset-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #d4af37;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            margin-bottom: 40px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }

        .reset-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="heartbeat-bg"></div>
    <a href="home.html" class="glass-home-btn"><i class="fas fa-home"></i></a>

    <h1 class="header-title" id="secret-title">The Golden Archive</h1>
    <script>
        // SECRET MENU: Tap title 5 times to reset
        let tapCount = 0;
        document.getElementById('secret-title').addEventListener('click', () => {
            tapCount++;
            if (tapCount === 5) {
                tapCount = 0;
                resetCoupons();
            }
            // Reset count if idle for 2 seconds
            setTimeout(() => { tapCount = 0; }, 2000);
        });
    </script>
    <p class="subtitle">Click to reveal your official ticket.</p>

    <div class="coupon-grid" id="grid">
        <!-- Coupons injected by JS -->
    </div>

    <!-- RESET BUTTON -->


    <style>
        /* Animation for Tearing Effect */
        @keyframes tearOff {
            0% {
                transform: translateX(0) rotate(0);
                opacity: 1;
            }

            30% {
                transform: translateX(-10px) rotate(-5deg);
                /* Tension */
            }

            100% {
                transform: translateX(-150px) rotate(-15deg) translateY(50px);
                /* Rip and Drop */
                opacity: 0;
            }
        }

        /* WAX SEAL ANIMATION */
        @keyframes waxSplat {
            0% {
                transform: scale(3);
                opacity: 0;
                filter: blur(4px);
                /* Liquid look */
            }

            40% {
                transform: scale(0.9);
                opacity: 1;
                filter: blur(2px);
            }

            70% {
                transform: scale(1.1);
                /* Squish */
                filter: blur(0);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .stamp {
            margin-top: 15px;
            display: none;
            /* Hidden by default until redeemed */
            width: 120px;
            height: 120px;
            /* Flex but hidden via opacity/scale in keyframes initially? No, js toggles display/class */
            align-items: center;
            justify-content: center;
            background: #991b1b;
            /* Deep Red Wax */
            border-radius: 50%;
            color: rgba(255, 255, 255, 0.9);
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1rem;
            text-align: center;
            box-shadow:
                inset 0 0 20px rgba(0, 0, 0, 0.5),
                /* Depth */
                0 4px 10px rgba(0, 0, 0, 0.4),
                /* Drop shadow */
                0 0 0 4px rgba(153, 27, 27, 0.4);
            /* Outer Ring */
            border: 2px solid rgba(255, 255, 255, 0.2);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
            transform: rotate(-10deg);
        }

        /* Inner Ring for detailing */
        .stamp::after {
            content: '';
            position: absolute;
            width: 90%;
            height: 90%;
            border-radius: 50%;
            border: 1px dashed rgba(255, 255, 255, 0.3);
        }

        .stamp.wax-active {
            display: flex;
            animation: waxSplat 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* Default state if loaded from storage */
        .stamp.redeemed-static {
            display: flex;
            opacity: 1;
        }

        .stub.tearing {
            animation: tearOff 0.8s forwards ease-in;
            transform-origin: top right;
        }

        /* Updated Front Styling for Tear support */
        .coupon-front {
            display: flex;
            color: #333;
            overflow: visible;
            /* Allow stub to fly out */
        }

        .stub {
            width: 70px;
            background: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 2px dashed rgba(0, 0, 0, 0.4);
            border-radius: 12px 0 0 12px;
            /* Manual radius */
            z-index: 2;
            /* On top */
        }

        .content {
            border-radius: 0 12px 12px 0;
            /* Manual radius */
        }

        /* Initial hidden state for unredeemed stamp */

        /* CUSTOM MODAL CSS */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-box {
            background: rgba(20, 20, 25, 0.9);
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 30px rgba(253, 185, 49, 0.15);
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 90%;
            width: 320px;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-title {
            font-family: 'Cinzel', serif;
            color: #FFD700;
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .modal-msg {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-btn {
            padding: 10px 20px;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: transform 0.2s;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-confirm {
            background: linear-gradient(135deg, #FFD700, #FDB931);
            color: #1a1a1a;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(253, 185, 49, 0.3);
        }
    </style>


    <!-- CUSTOM POPUP HTML -->
    <div id="custom-confirm-modal" class="modal-overlay">
        <div class="modal-box">
            <h3 class="modal-title" id="modal-title">Redeem Voucher?</h3>
            <p class="modal-msg" id="modal-msg">This action cannot be undone.</p>
            <div class="modal-actions">
                <button class="modal-btn btn-cancel" onclick="resolveModal(false)">Cancel</button>
                <button class="modal-btn btn-confirm" onclick="resolveModal(true)">Yes, I'm Sure</button>
            </div>
        </div>
    </div>

    <script>
        // --- CUSTOM MODAL LOGIC ---
        let modalResolve = null;

        function openModal(title, msg, confirmText = "Yes, I'm Sure") {
            const modal = document.getElementById('custom-confirm-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-msg').innerText = msg;
            document.querySelector('.btn-confirm').innerText = confirmText;

            modal.classList.add('active');

            return new Promise((resolve) => {
                modalResolve = resolve;
            });
        }

        function resolveModal(result) {
            const modal = document.getElementById('custom-confirm-modal');
            modal.classList.remove('active');
            if (modalResolve) {
                modalResolve(result);
                modalResolve = null;
            }
        }

        // Coupon Data with unique Terms - REPLACED Massage with Breakfast
        const couponsData = [
            { id: 1, title: "Late Night Drive", icon: "fa-car", desc: "One scenic drive with your favorite playlist.", terms: "Valid for one (1) drive. Driver controls aux cord privileges." },
            { id: 2, title: "Home Cooked Meal", icon: "fa-utensils", desc: "I cook anything you want. No questions.", terms: "Includes cleanup duty. Chef kiss mandatory." },
            { id: 3, title: "Win an Argument", icon: "fa-gavel", desc: "Redeem to instantly win any dispute.", terms: "Absolute power. Cannot be used for pizza topping debates." },
            { id: 4, title: "Breakfast in Bed", icon: "fa-mug-hot", desc: "Pancakes, coffee, and lazy morning vibes.", terms: "Valid until noon. Crumb cleanup included." },
            { id: 5, title: "Movie Marathon", icon: "fa-film", desc: "You pick the movies and the snacks.", terms: "Valid for unlimited sequels. No talking during crucial scenes." },
            { id: 6, title: "Yes Day", icon: "fa-wand-magic-sparkles", desc: "I have to say YES to everything for 12h.", terms: "Safe word is 'John is broke'. 12 hour limit." }
        ];

        // Load Redemption State
        let redeemedState = JSON.parse(localStorage.getItem('redeemedCoupons')) || {};

        const grid = document.getElementById('grid');

        function generateSerial(id) {
            return `LOVE-2026-XOXO-${id.toString().padStart(3, '0')}`;
        }

        function renderCoupons() {
            grid.innerHTML = '';
            couponsData.forEach(coupon => {
                const isRedeemed = redeemedState[coupon.id];

                // Create Wrapper
                const wrapper = document.createElement('div');
                wrapper.className = `coupon-wrapper ${isRedeemed ? 'flipped' : ''}`;

                // 3D Inner Container
                const inner = document.createElement('div');
                inner.className = 'coupon-inner';

                // FRONT SIDE
                const front = document.createElement('div');
                front.className = 'coupon-front';
                front.innerHTML = `
                    <div class="stub" id="stub-${coupon.id}"><span>ADMIT ONE</span></div>
                    <div class="content">
                        <i class="fas ${coupon.icon}"></i>
                        <h3>${coupon.title}</h3>
                        <p>${coupon.desc}</p>
                    </div>
                `;

                // BACK SIDE (Wonka Style)
                const back = document.createElement('div');
                back.className = 'coupon-back';
                const serial = generateSerial(coupon.id);
                // Wax Seal Logic: If redeemed, show static. Else hidden.
                back.innerHTML = `
                    <div class="serial-number">NO: ${serial}</div>
                    <p class="terms">${coupon.terms}</p>
                    <div class="stamp ${isRedeemed ? 'redeemed-static' : ''}">REDEEMED</div>
                    <p style="font-size:0.6rem; margin-top:20px; opacity:0.6;">Janes Birthday Official</p>
                `;

                // Assemble
                inner.appendChild(front);
                inner.appendChild(back);
                wrapper.appendChild(inner);

                // Click Event
                if (!isRedeemed) {
                    wrapper.onclick = () => redeemCoupon(coupon.id, wrapper);
                } else {
                    wrapper.style.cursor = "default";
                }

                grid.appendChild(wrapper);
            });
        }

        async function redeemCoupon(id, wrapperElement) {
            // REPLACED: confirm("Redeem this voucher? This cannot be undone!")
            const isConfirmed = await openModal(
                "Redeem Voucher?",
                "Are you sure you want to redeem this one? This action cannot be undone!",
                "Redeem Now"
            );

            if (isConfirmed) {

                wrapperElement.onclick = null; // Disable immediately
                wrapperElement.style.cursor = "default";

                // 1. TEAR ANIMATION
                const stub = wrapperElement.querySelector('.stub');
                if (stub) {
                    stub.classList.add('tearing');
                }

                // 2. WAIT FOR TEAR, THEN FLIP
                setTimeout(() => {
                    wrapperElement.classList.add('flipped');

                    // 3. WAIT FOR FLIP, THEN WAX SEAL
                    setTimeout(() => {
                        redeemedState[id] = new Date().toISOString();
                        localStorage.setItem('redeemedCoupons', JSON.stringify(redeemedState));

                        // Find stamp and trigger animation
                        const stamp = wrapperElement.querySelector('.stamp');
                        if (stamp) {
                            stamp.classList.add('wax-active'); // Triggers waxSplat

                            // Optional: Add a "thud" vibration if mobile
                            if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
                        }

                    }, 600);
                }, 600);
            }
        }

        async function resetCoupons() {
            const isConfirmed = await openModal(
                "Reset History?",
                "This will make all coupons available again. The history will be lost.",
                "Reset All"
            );

            if (isConfirmed) {
                redeemedState = {};
                localStorage.removeItem('redeemedCoupons');
                renderCoupons();
            }
        }

        renderCoupons();
    </script>
    <script src="cursor.js"></script>
    <script src="avatars.js"></script>
</body>

</html>
