<!DOCTYPE html>
<html lang="en">

<head>
    <!-- SECURITY CHECK -->
    <script src="auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Universe - Jane's Birthday</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌐</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="music-toggle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            /* Deep Space */
            color: white;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        /* Ambient Space Background */
        .space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000000 70%);
            z-index: -2;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(white, rgba(255, 255, 255, 0.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255, 255, 255, 0.15) 1px, transparent 2px),
                radial-gradient(white, rgba(255, 255, 255, 0.1) 2px, transparent 3px);
            background-size: 550px 550px, 350px 350px, 250px 250px;
            background-position: 0 0, 40px 60px, 130px 270px;
            opacity: 0.8;
            z-index: -1;
            animation: drift 120s linear infinite;
        }

        @keyframes drift {
            from {
                background-position: 0 0, 40px 60px, 130px 270px;
            }

            to {
                background-position: 550px 550px, 390px 410px, 380px 520px;
            }
        }

        /* SPLIT TITLE (Left & Right) */
        .split-title {
            position: absolute;
            top: 50%;
            width: 100%;
            pointer-events: none;
            z-index: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 10%;
            /* Spacing from edges */
            box-sizing: border-box;
            transform: translateY(-50%);
        }

        .title-part {
            text-align: center;
            opacity: 0.8;
            mix-blend-mode: screen;
        }

        .title-left {
            text-align: right;
            /* Align towards sphere */
            flex: 1;
            padding-right: 250px;
            /* Push away from center sphere */
        }

        .title-right {
            text-align: left;
            /* Align towards sphere */
            flex: 1;
            padding-left: 250px;
            /* Push away from center sphere */
        }

        .core-text {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            background: linear-gradient(to bottom, #fff, #aaa);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            white-space: nowrap;
            /* Prevent wrapping */
        }

        .core-sub {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 10px;
            letter-spacing: 3px;
        }

        /* Mobile adjust */
        @media (max-width: 768px) {
            .split-title {
                flex-direction: column;
                padding: 0;
                top: 15%;
                /* Move to top */
                transform: none;
                gap: 50vh;
                /* Gap for sphere */
            }

            .title-left,
            .title-right {
                text-align: center;
                padding: 0;
            }

            .core-text {
                font-size: 2rem;
            }
        }

        /* Controls */
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 100;
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* SPHERE CONTAINER Styles injected by JS, but we can override basics */
        #sphere-container .sphere-item {
            transition: transform 0.1s linear;
            /* Smooth drag */
        }

        #sphere-container .sphere-item img {
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        #sphere-container .sphere-item:hover img {
            transform: scale(1.2);
            box-shadow: 0 0 25px rgba(236, 72, 153, 0.8);
            border-color: #ec4899;
            z-index: 2000;
        }

        /* Instructions Overlay */
        .instruction-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 1;
            transition: opacity 1s ease;
            z-index: 50;
            text-align: center;
        }

        .instruction-overlay.fade-out {
            opacity: 0;
        }

        .drag-icon {
            font-size: 2rem;
            animation: floatHand 2s ease-in-out infinite;
            display: block;
            margin-bottom: 10px;
            opacity: 0.7;
        }

        @keyframes floatHand {

            0%,
            100% {
                transform: translateX(-10px);
            }

            50% {
                transform: translateX(10px);
            }
        }

        /* LIGHTBOX STYLES */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .lightbox-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .lightbox-overlay.active .lightbox-content {
            transform: scale(1);
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 10px;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .close-btn {
            position: absolute;
            top: -50px;
            right: 0;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .close-btn:hover {
            transform: scale(1.2) rotate(90deg);
            color: #ff4d6d;
        }
    </style>
</head>

<body>

    <a href="home.html" class="glass-home-btn"><i class="fas fa-home"></i></a>
    <script src="music-toggle.js"></script>

    <div class="space-bg"></div>
    <div class="stars"></div>

    <div class="split-title">
        <div class="title-part title-left">
            <div class="core-text">You Are</div>
            <div class="core-sub">MY UNIVERSE</div>
        </div>
        <div class="title-part title-right">
            <div class="core-text">My Center</div>
            <div class="core-sub">360° OF MEMORIES</div>
        </div>
    </div>

    <!-- SPHERE TARGET -->
    <div id="sphere-container"></div>

    <!-- LIGHTBOX -->
    <div class="lightbox-overlay" id="lightbox" onclick="closeLightbox()">
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <div class="close-btn" onclick="closeLightbox()">&times;</div>
            <img src="" alt="Memory" class="lightbox-img" id="lightbox-img">
        </div>
    </div>

    <div class="instruction-overlay" id="instr">
        <i class="fas fa-hand-pointer drag-icon"></i>
        <p>Drag to Rotate • Click to Inspect</p>
    </div>

    <div class="controls">
        <button class="ctrl-btn" onclick="toggleAutoRotate()"><i class="fas fa-sync-alt" id="spin-icon"></i> <span
                id="spin-text">Pause Spin</span></button>
        <button class="ctrl-btn" onclick="resetView()"><i class="fas fa-compress-arrows-alt"></i> Reset</button>
    </div>

    <script src="sphere.js"></script>
    <script>
        // 1. Generate Image List from sample images
        const imageList = Array.from({ length: 50 }, () => ({
            src: `https://placehold.co/400x400/1a1a2e/ffffff?text=Pics+Here`
        }));

        // 2. Initialize Sphere
        let mySphere;
        document.addEventListener('DOMContentLoaded', () => {
            mySphere = new SphereGrid('sphere-container', {
                images: imageList,
                containerSize: Math.min(window.innerWidth, window.innerHeight) * 0.9, // Responsive
                sphereRadius: Math.min(window.innerWidth, window.innerHeight) * 0.35,
                baseImageScale: 0.15, // Size of photos
                autoRotateSpeed: 0.2,
                onImageClick: openLightbox // Callback!
            });

            // Fade out instructions
            setTimeout(() => {
                document.getElementById('instr').classList.add('fade-out');
            }, 3000);
        });

        // 3. Controls
        function toggleAutoRotate() {
            mySphere.config.autoRotate = !mySphere.config.autoRotate;
            const btnText = document.getElementById('spin-text');
            const icon = document.getElementById('spin-icon');
            if (mySphere.config.autoRotate) {
                btnText.innerText = "Pause Spin";
                icon.classList.add('fa-spin');
            } else {
                btnText.innerText = "Auto Spin";
                icon.classList.remove('fa-spin');
                // stop momentum
                mySphere.velocity = { x: 0, y: 0 };
            }
        }

        function resetView() {
            mySphere.rotation = { x: 15, y: 15, z: 0 };
            mySphere.velocity = { x: 0, y: 0 };
        }

        // 4. Lightbox Logic
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        function openLightbox(imgData) {
            // Stop rotation while viewing
            if (mySphere.config.autoRotate) toggleAutoRotate();

            lightboxImg.src = imgData.src;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            lightbox.classList.remove('active');

            // Resume rotation if it was originally on? 
            // For now, let's keep it paused so she can look around again manually, 
            // or we could auto-resume. Let's keep paused for better UX.
        }

        // Resize handler
        window.addEventListener('resize', () => {
            // Simple reload or resize logic? SphereJS might need re-init or style update.
            // For chaos prevention, just verify center
            // Ideally SphereJS would handle resize.
        });

    </script>
</body>

</html>
