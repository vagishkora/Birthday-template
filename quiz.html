<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Person A vs Person B - The Showdown</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="cursor.css">
    <link rel="stylesheet" href="avatars.css">
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .quiz-container {
            width: 90%;
            max-width: 600px;
            margin-top: 80px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .header-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #FFD700, #ff6b6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.3);
            animation: floatSlow 3s ease-in-out infinite;
        }

        /* CARD STYLES */
        .question-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
            position: relative;
            overflow: hidden;
        }

        .question-text {
            font-size: 1.5rem;
            margin-bottom: 40px;
            line-height: 1.4;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-5px);
            border-color: #FFD700;
        }

        .option-avatar {
            font-size: 3rem;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.3));
        }

        .option-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transition: all 0.3s;
        }

        .dot.active {
            background: #FFD700;
            transform: scale(1.5);
            box-shadow: 0 0 10px #FFD700;
        }

        /* FEEDBACK OVERLAY (ROAST MODE) */
        .feedback-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            border-radius: 24px;
            transition: opacity 0.3s;
        }

        .feedback-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .roast-text {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ff6b6b;
            margin-bottom: 15px;
            padding: 0 10px;
            transform: scale(0.5);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .feedback-overlay.show .roast-text {
            transform: scale(1);
        }

        .roast-meme {
            font-size: 3.5rem;
            margin-bottom: 10px;
            animation: bounce 1s infinite;
        }

        .next-btn {
            background: #FFD700;
            color: #0f172a;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        .next-btn:hover {
            transform: scale(1.1);
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes floatSlow {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        /* FINAL SCORE CARD */
        .result-stats {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #aaa;
        }
    </style>
</head>

<body>

    <div class="heartbeat-bg"></div>
    <a href="home.html" class="glass-home-btn"><i class="fas fa-home"></i></a>

    <div class="quiz-container">
        <h1 class="header-title">The Ultimate Showdown 🥊</h1>

        <div class="progress-dots" id="dots">
            <!-- Dots via JS -->
        </div>

        <div class="question-card" id="quiz-card">
            <h2 class="question-text" id="question">Loading...</h2>

            <div class="options-grid">
                <div class="option-btn" onclick="answer('Person A')">
                    <span class="option-avatar">A</span>
                    <span class="option-name">Person A</span>
                </div>
                <div class="option-btn" onclick="answer('Person B')">
                    <span class="option-avatar">B</span>
                    <span class="option-name">Person B</span>
                </div>
            </div>

            <!-- FEEDBACK (Hidden by default) -->
            <div class="feedback-overlay" id="feedback">
                <div class="roast-meme" id="meme">🤡</div>
                <div class="roast-text" id="roast">Roast Text Here</div>
                <button class="next-btn" onclick="nextQuestion()">Next Round ➡</button>
            </div>
        </div>
    </div>


    <script src="cursor.js"></script>
    <script>
        const questions = [
            {
                q: "Who takes longer to get ready?",
                roast: {
                    "Person A": "A classic choice! Takes forever.",
                    "Person B": "Obviously! Always changing outfits."
                },
                reaction: { "Person A": "🙄", "Person B": "💄" }
            },
            {
                q: "Who is the better cook?",
                roast: {
                    "Person A": "Only good at making toast.",
                    "Person B": "Masterchef in the house!"
                },
                reaction: { "Person A": "🤢", "Person B": "🍝" }
            },
            {
                q: "Who is more dramatic?",
                roast: {
                    "Person A": "Can't hide those expressions.",
                    "Person B": "Oscar performance every time!"
                },
                reaction: { "Person A": "🤥", "Person B": "🎭" }
            },
            {
                q: "Who spends more money?",
                roast: {
                    "Person A": "Gadgets and food everywhere.",
                    "Person B": "Shopping spree queen!"
                },
                reaction: { "Person A": "📱", "Person B": "💸" }
            },
            {
                q: "Who has the better music taste?",
                roast: {
                    "Person A": "Listening to the same song forever.",
                    "Person B": "Vibes only!"
                },
                reaction: { "Person A": "👂", "Person B": "💃" }
            }
        ];

        let currentQ = 0;

        // Init
        function loadQuestion() {
            // Update dots
            const dotsContainer = document.getElementById('dots');
            dotsContainer.innerHTML = '';
            questions.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `dot ${i === currentQ ? 'active' : ''}`;
                dotsContainer.appendChild(dot);
            });

            // Update Text
            const q = questions[currentQ];
            document.getElementById('question').innerText = q.q;

            // Hide Feedback
            document.getElementById('feedback').classList.remove('show');
        }

        function answer(who) {
            const q = questions[currentQ];
            const roastText = q.roast[who];
            const reaction = q.reaction[who];

            document.getElementById('roast').innerText = roastText;
            document.getElementById('meme').innerText = reaction;
            document.getElementById('feedback').classList.add('show');
        }

        function nextQuestion() {
            currentQ++;
            if (currentQ < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            const card = document.getElementById('quiz-card');
            card.innerHTML = `
                <div style="font-size:4rem; margin-bottom:20px;">🏆</div>
                <h2 style="color:#FFD700; margin-bottom:10px;">And the Winner is...</h2>
                <h1 style="font-size:2.5rem; margin-bottom:20px;">US! ❤️</h1>
                <p style="color:#ccc; line-height:1.6;">Because we make the perfect chaotic team.</p>
                <div class="result-stats">
                    Wait... did you actually think one of us would win? <br>
                    I love you, you winner! 😘
                </div>
                <a href="home.html" class="next-btn" style="text-decoration:none; display:inline-block; margin-top:30px;">Back to Home</a>
            `;
        }

        // Start
        loadQuestion();
    </script>
</body>

</html>
