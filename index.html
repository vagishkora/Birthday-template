<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Surprise</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="music-toggle.css"> <!-- Global Music Toggle -->
    <style>
        /* ✅ CSS BACKGROUND (DROP-IN) */
        body {
            margin: 0;
            height: 100vh;
            background-color: #020617;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            flex-direction: column;
        }

        .heartbeat-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center,
                    rgba(244, 114, 182, 0.18),
                    rgba(244, 114, 182, 0.08),
                    transparent 65%);
            animation: heartbeat 5.5s ease-in-out infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes heartbeat {
            0% {
                transform: scale(1);
                opacity: 0.6;
            }

            50% {
                transform: scale(1.15);
                opacity: 0.9;
            }

            100% {
                transform: scale(1);
                opacity: 0.6;
            }
        }

        /* 🔑 PASSWORD BOX STYLE */
        .login-container {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            padding: 3rem 4rem;
            border-radius: 20px;
            text-align: center;
            color: #fff;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            margin: 0;
            color: rgba(244, 114, 182, 0.9);
            text-shadow: 0 0 15px rgba(244, 114, 182, 0.4);
        }

        p {
            margin: 0;
            font-size: 1rem;
            opacity: 0.7;
            letter-spacing: 1px;
        }

        .password-input {
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 1.1rem;
            outline: none;
            text-align: center;
            width: 250px;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .password-input:focus {
            border-color: rgba(244, 114, 182, 0.6);
            box-shadow: 0 0 15px rgba(244, 114, 182, 0.2);
        }

        .error-msg {
            color: #ffb3c1;
            font-size: 0.9rem;
            margin-top: 5px;
            opacity: 0;
            transition: 0.3s;
        }

        /* ✨ OPTIONAL - CALM ANIMATION */
        body.entered .heartbeat-bg {
            animation: calm 2s ease forwards;
        }

        body.entered .login-container {
            transition: opacity 1.5s ease;
            opacity: 0;
            transform: scale(0.95);
        }

        @keyframes calm {
            to {
                opacity: 0;
                transform: scale(1);
            }
        }

        /* BIOMETRIC SCANNER STYLES */
        .bio-container {
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            /* Glass Background */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.25);
            display: flex;
            height: 80px;
            justify-content: center;
            position: relative;
            width: 200px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .bio-container:hover {
            box-shadow: 0 0 20px rgba(244, 114, 182, 0.4);
            /* Pink Glow Hover */
            border-color: rgba(244, 114, 182, 0.6);
        }

        .text {
            color: rgba(255, 255, 255, 0.9);
            position: absolute;
            transition: opacity 300ms;
            user-select: none;
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .fingerprint {
            left: -8px;
            opacity: 0;
            position: absolute;
            stroke: rgba(255, 255, 255, 0.5);
            /* Inactive Color */
            top: -9px;
            transition: opacity 1ms;
            width: 100px;
            height: 100px;
        }

        .fingerprint-active {
            stroke: #f472b6;
            /* Pink Neon Active */
        }

        .fingerprint-out {
            opacity: 1;
        }

        .odd {
            stroke-dasharray: 0px 50px;
            stroke-dashoffset: 1px;
            transition: stroke-dasharray 1ms;
        }

        .even {
            stroke-dasharray: 50px 50px;
            stroke-dashoffset: -41px;
            transition: stroke-dashoffset 1ms;
        }

        .ok {
            opacity: 0;
            width: 100px;
            height: 100px;
            position: absolute;
        }

        /* ANIMATION STATES */
        .active.bio-container {
            animation: 4s Container;
            /* Speed up to 4s for UX */
        }

        .active .text {
            opacity: 0;
            animation: 4s Text forwards;
        }

        .active .fingerprint {
            opacity: 1;
            transition: opacity 300ms 200ms;
        }

        /* Speeding up original animation Keyframes slightly */
        .active .fingerprint-base .odd {
            stroke-dasharray: 50px 50px;
            transition: stroke-dasharray 800ms 100ms;
        }

        .active .fingerprint-base .even {
            stroke-dashoffset: 0px;
            transition: stroke-dashoffset 800ms;
        }

        .active .fingerprint-active .odd {
            stroke-dasharray: 50px 50px;
            transition: stroke-dasharray 2000ms 1500ms;
        }

        .active .fingerprint-active .even {
            stroke-dashoffset: 0px;
            transition: stroke-dashoffset 2000ms 1300ms;
        }

        .active .fingerprint-out {
            opacity: 0;
            transition: opacity 300ms 3500ms;
            /* Adjust end fade */
        }

        .active .ok {
            opacity: 1;
            animation: 4s Ok forwards;
        }

        @keyframes Container {
            0% {
                width: 200px
            }

            6% {
                width: 80px
            }

            71% {
                transform: scale(1);
            }

            75% {
                transform: scale(1.1);
                box-shadow: 0 0 25px #f472b6;
            }

            77% {
                transform: scale(1);
            }

            94% {
                width: 80px
            }

            100% {
                width: 200px
            }
        }

        @keyframes Text {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            6% {
                opacity: 0;
                transform: scale(0.5);
            }

            94% {
                opacity: 0;
                transform: scale(0.5);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes Ok {
            0% {
                opacity: 0
            }

            70% {
                opacity: 0;
                transform: scale(0);
            }

            75% {
                opacity: 1;
                transform: scale(1.1);
            }

            77% {
                opacity: 1;
                transform: scale(1);
            }

            92% {
                opacity: 1;
                transform: scale(1);
            }

            96% {
                opacity: 0;
                transform: scale(0.5);
            }

            100% {
                opacity: 0
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        .shake {
            animation: shake 0.5s;
        }
    </style>
</head>

<body>
    <canvas id="sky"></canvas>

    <div class="overlay">
        <h1>Welcome to the Journey</h1>
        <p class="instruction">Connect the stars to unlock your world...</p>
    </div>

    <!-- MOVED OUTSIDE OVERLAY -->
    <div class="fallback-login">
        <form id="login-form" action="#" onsubmit="handleFormSubmit(event)">
            <input type="password" id="password" class="mini-input" placeholder="Or type demo password..."
                autocomplete="off">
            <button type="submit" class="login-btn">Unlock 🔓</button>
        </form>
    </div>

    <!-- SUCCESS FLASH OVERLAY -->
    <div class="flash-overlay"></div>

    <script src="constellation.js"></script>
    <script>
        // Fallback Password Logic
        const passInput = document.getElementById('password');
        const loginForm = document.getElementById('login-form');
        let isLoggingIn = false;

        async function checkPassword(input) {
            if (!input) return false;
            const normalized = input.toLowerCase().trim();
            
            // Simple generic password check
            return normalized === "abcd" || normalized === "0000" || normalized === "1234";
        }

        async function handleLogin() {
            if (isLoggingIn) return;
            isLoggingIn = true;

            const isValid = await checkPassword(passInput.value);
            if (isValid) {
                // AUTHENT SUCCESS
                sessionStorage.setItem('generic_authorized', 'true');
                document.body.classList.add('entered'); // Trigger final flash

                passInput.blur(); // Hide keyboard

                // Haptic feedback
                if (navigator.vibrate) navigator.vibrate([50, 50, 50]);

                // Redirect
                setTimeout(() => {
                    window.location.href = "home.html";
                }, 1000);
            } else {
                passInput.classList.add('shake');
                if (navigator.vibrate) navigator.vibrate(200);
                setTimeout(() => {
                    passInput.classList.remove('shake');
                    isLoggingIn = false;
                }, 500);
            }
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            handleLogin();
            return false;
        }

        // DOUBLE SAFEGUARD: Direct Key Listener
        passInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleLogin();
            }
        });
    </script>
    <script src="music-toggle.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #020617;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        #sky {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: crosshair;
        }

        .overlay {
            position: absolute;
            top: 20%;
            width: 100%;
            text-align: center;
            z-index: 2;
            pointer-events: none;
            /* Let clicks pass to canvas */
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            color: rgba(244, 114, 182, 0.9);
            text-shadow: 0 0 20px rgba(244, 114, 182, 0.6);
            margin: 0;
            opacity: 0.8;
        }

        .instruction {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .fallback-login {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            pointer-events: none;
            opacity: 0;
            transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 5;
            text-align: center;
        }

        /* Reveal on Unlock */
        body.unlocked .fallback-login {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        .fallback-login:hover {
            opacity: 1;
        }

        .mini-input {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 25px;
            border-radius: 30px;
            color: white;
            outline: none;
            backdrop-filter: blur(10px);
            font-size: 1rem;
            text-align: center;
            width: 200px;
            transition: all 0.3s ease;
            margin-bottom: 15px;
            /* Spacing for button */
        }

        .login-btn {
            display: block;
            margin: 0 auto;
            padding: 10px 30px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(135deg, #ec4899 0%, #be185d 100%);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(236, 72, 153, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
        }

        .login-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(236, 72, 153, 0.6);
        }

        .login-btn:active {
            transform: scale(0.95);
        }

        .shake {
            animation: shake 0.4s;
            border-color: red;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        /* UNLOCK ANIMATIONS */
        body.unlocked #sky,
        body.unlocked .heartbeat-bg,
        body.unlocked h1,
        body.unlocked .instruction {
            opacity: 0.05;
            /* Fade out almost completely */
            transition: opacity 1.5s ease;
            pointer-events: none;
        }

        .unlocked .overlay {
            /* Overlay container itself doesn't need to fade out anymore since we target children, 
               but we keep this to handle position if needed. 
               Actually, checking previous logic, overlay faded out before. 
               This new rule handles specific children better. */
            pointer-events: none;
        }

        .flash-overlay {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
            transition: opacity 2.5s ease-out;
        }

        body.unlocked .flash-overlay {
            display: none;
            /* User requested removal of white flash */
        }

        @keyframes galaxyExplode {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }

            20% {
                opacity: 0.8;
                transform: scale(1.1);
                background: white;
                /* Brief flash */
            }

            100% {
                opacity: 0;
                /* Fade out completely */
                transform: scale(1.5);
                display: none;
            }
        }
    </style>
    <!-- TYPEWRITER SCRIPT -->
    <script>
        const titleText = "Welcome to the Journey";
        const titleElement = document.querySelector('h1');
        titleElement.textContent = ""; // Clear initial text

        let typeIndex = 0;
        function typeWriter() {
            if (typeIndex < titleText.length) {
                titleElement.textContent += titleText.charAt(typeIndex);
                typeIndex++;
                setTimeout(typeWriter, 100); // Typing speed
            }
        }
        // Start typing after a short delay
        setTimeout(typeWriter, 500);
    </script>
    <script>
        // TAB TITLE SWITCHER (Micro-Interaction)
        let docTitle = document.title;
        window.addEventListener("blur", () => {
            document.title = "Come back! 🥺";
        });
        window.addEventListener("focus", () => {
            document.title = docTitle;
        });
    </script>
</body>

</html>
